name: ci.yml
on:
  push:
    branches: [ master ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ master ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
#      - name: Setup Node via nvm
#        run: |
#          export NVM_DIR="$HOME/.nvm"
#          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
#          nvm use 24.14.0
#          echo "$(npm bin)" >> $GITHUB_PATH

      - uses: actions/checkout@v4
#        with:
#          node-version: '24'
#
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Move static files
        run: rsync -av --delete dist/ /var/www/apart-manager/